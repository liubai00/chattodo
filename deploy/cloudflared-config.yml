# Cloudflare Tunnel 配置（命名隧道 + 自有域名）
# 首次使用：
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create chattodo
#   3. 把 tunnel id 填到下面 tunnel: 行，credentials-file 路径按实际修改
#   4. cloudflared tunnel route dns chattodo todo.yourdomain.com
#   5. cloudflared tunnel --config deploy/cloudflared-config.yml run
#
tunnel: <TUNNEL_ID>
credentials-file: C:\Users\Administrator\.cloudflared\<TUNNEL_ID>.json

ingress:
  - hostname: todo.yourdomain.com
    service: http://127.0.0.1:3000
  - service: http_status:404
